name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build all targets
        run: bash build.sh

      - name: Compute SHA256 hashes
        id: sha256
        run: |
          echo "macos_arm64=$(sha256sum dist/greet-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$(sha256sum dist/greet-macos-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/greet-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum dist/greet-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/greet-macos-arm64 \
            dist/greet-macos-x64 \
            dist/greet-linux-arm64 \
            dist/greet-linux-x64 \
            --title "greet ${{ github.ref_name }}" \
            --generate-notes

      - name: Update Formula/greet.rb
        env:
          TAG: ${{ github.ref_name }}
          SHA256_MACOS_ARM64: ${{ steps.sha256.outputs.macos_arm64 }}
          SHA256_MACOS_X64: ${{ steps.sha256.outputs.macos_x64 }}
          SHA256_LINUX_ARM64: ${{ steps.sha256.outputs.linux_arm64 }}
          SHA256_LINUX_X64: ${{ steps.sha256.outputs.linux_x64 }}
        run: |
          VERSION="${TAG#v}"  # strip leading 'v'
          python3 - <<'EOF'
          import os, re

          formula_path = "Formula/greet.rb"
          with open(formula_path, "r") as f:
              content = f.read()

          version   = os.environ["VERSION"]
          m_arm64   = os.environ["SHA256_MACOS_ARM64"]
          m_x64     = os.environ["SHA256_MACOS_X64"]
          l_arm64   = os.environ["SHA256_LINUX_ARM64"]
          l_x64     = os.environ["SHA256_LINUX_X64"]

          content = re.sub(r'version "[^"]+"', f'version "{version}"', content)
          content = content.replace("PLACEHOLDER_SHA256_MACOS_ARM64", m_arm64)
          content = content.replace("PLACEHOLDER_SHA256_MACOS_X64",   m_x64)
          content = content.replace("PLACEHOLDER_SHA256_LINUX_ARM64", l_arm64)
          content = content.replace("PLACEHOLDER_SHA256_LINUX_X64",   l_x64)

          # Also replace real hashes from previous releases
          # (pattern: 64 hex chars on a sha256 line that doesn't match current)
          def replace_sha(placeholder, real):
              # already replaced above if placeholder; handle re-releases by
              # matching the old real hash via context lines
              pass  # covered by direct replacement above

          with open(formula_path, "w") as f:
              f.write(content)

          print(f"Updated Formula/greet.rb to version {version}")
          EOF

      - name: Commit and push updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/greet.rb
          git commit -m "chore: update formula for ${{ github.ref_name }}"
          git push origin HEAD:main
