name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build all targets
        run: bash build.sh

      - name: Compute SHA256 hashes
        id: sha256
        run: |
          echo "macos_arm64=$(sha256sum dist/greet-macos-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$(sha256sum dist/greet-macos-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/greet-linux-arm64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(sha256sum dist/greet-linux-x64 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/greet-macos-arm64 \
            dist/greet-macos-x64 \
            dist/greet-linux-arm64 \
            dist/greet-linux-x64 \
            --title "greet ${{ github.ref_name }}" \
            --generate-notes

      - name: Update Formula/greet.rb
        env:
          TAG: ${{ github.ref_name }}
          SHA256_MACOS_ARM64: ${{ steps.sha256.outputs.macos_arm64 }}
          SHA256_MACOS_X64: ${{ steps.sha256.outputs.macos_x64 }}
          SHA256_LINUX_ARM64: ${{ steps.sha256.outputs.linux_arm64 }}
          SHA256_LINUX_X64: ${{ steps.sha256.outputs.linux_x64 }}
        run: |
          export VERSION="${TAG#v}"
          python3 - <<'PYEOF'
          import os, re

          formula_path = "Formula/greet.rb"
          with open(formula_path, "r") as f:
              content = f.read()

          version = os.environ["VERSION"]
          m_arm64 = os.environ["SHA256_MACOS_ARM64"]
          m_x64   = os.environ["SHA256_MACOS_X64"]
          l_arm64 = os.environ["SHA256_LINUX_ARM64"]
          l_x64   = os.environ["SHA256_LINUX_X64"]

          # Update version line
          content = re.sub(r'version "[^"]+"', f'version "{version}"', content)

          # Replace SHA256 values — matches both PLACEHOLDER strings and real
          # 64-char hex hashes from previous releases, keyed by surrounding context
          sha_pattern = r'(?<={keyword}\n      sha256 ")[^"]+'

          def patch_sha(content, url_fragment, new_hash):
              return re.sub(
                  r'(url "[^"]*' + re.escape(url_fragment) + r'[^"]*"\n      sha256 ")[^"]+(")',
                  lambda m: m.group(1) + new_hash + m.group(2),
                  content,
              )

          content = patch_sha(content, "greet-macos-arm64", m_arm64)
          content = patch_sha(content, "greet-macos-x64",   m_x64)
          content = patch_sha(content, "greet-linux-arm64", l_arm64)
          content = patch_sha(content, "greet-linux-x64",   l_x64)

          with open(formula_path, "w") as f:
              f.write(content)

          print(f"Updated Formula/greet.rb to version {version}")
          print(f"  macos-arm64: {m_arm64}")
          print(f"  macos-x64:   {m_x64}")
          print(f"  linux-arm64: {l_arm64}")
          print(f"  linux-x64:   {l_x64}")
          PYEOF

      - name: Commit and push updated formula
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/greet.rb
          git commit -m "chore: update formula for ${{ github.ref_name }}"
          git push origin HEAD:main
